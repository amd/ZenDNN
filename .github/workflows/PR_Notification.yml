name: PR Status Notification
on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  checks: read
  pull-requests: read
  contents: read
  actions: read

jobs:
  notify_teams:
    runs-on: amd-zenai-arc-xsmall-dind
    timeout-minutes: 120
    if: github.actor != 'github-actions[bot]'
    
    steps:
      - name: Get PR info
        id: pr_info
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            
            return {
              number: pr.number,
              title: pr.title || '',
              url: pr.html_url || '',
              head_sha: pr.head.sha,
              author: pr.user?.login || '',
              base_ref: pr.base?.ref || '',
              head_ref: pr.head?.ref || ''
            };

      - name: Find Triggered ZenTorch Workflow
        id: find_zentorch
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.ZIAIE_PAT }}
          script: |
            const pr = JSON.parse(`${{ steps.pr_info.outputs.result }}`);
            const headSha = pr.head_sha;

            console.log(`🔍 Resolving ZenTorch build for PR #${pr.number} (head ${headSha})`);

            // Reliable correlation: ZenTorch reports a commit status back onto THIS
            // PR's head SHA with context "AMD-Zenai/ZenDNN_PyTorch_Plugin CI" and a
            // target_url pointing to the exact ZenTorch run. Matching by commit SHA
            // is deterministic, unlike the previous "most recent dispatch run within
            // 20 minutes" heuristic which could pick another PR's run or miss entirely.
            const CONTEXT_MATCH = 'zendnn_pytorch_plugin';

            const runIdFromUrl = (url) => {
              const m = (url || '').match(/\/actions\/runs\/(\d+)/);
              return m ? Number(m[1]) : undefined;
            };

            // Primary: SHA-matched commit status.
            const findByCommitStatus = async () => {
              try {
                const resp = await github.rest.repos.listCommitStatusesForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: headSha,
                  per_page: 100
                });
                // Newest first; take the first ZenTorch status.
                const st = resp.data.find(s =>
                  (s.context || '').toLowerCase().includes(CONTEXT_MATCH)
                );
                if (st) {
                  console.log(`✅ ZenTorch commit status: state=${st.state} url=${st.target_url || '(none)'}`);
                  return {
                    found: true,
                    external_run_id: runIdFromUrl(st.target_url),
                    external_run_url: st.target_url || '',
                    external_repo: 'AMD-Zenai/ZenDNN_PyTorch_Plugin',
                    external_status: st.state,   // pending | success | failure | error
                    match: 'commit_status',
                    token_used: 'ZIAIE_PAT'
                  };
                }
              } catch (e) {
                console.log(`⚠️ listCommitStatuses failed: ${e.message}`);
              }
              return null;
            };

            // Fallback: repository_dispatch run named "zendnnl-pr" that started at/after
            // this PR's head commit. Only used until the SHA-matched status appears, so
            // an in-progress link can still be shown.
            const findByDispatchHeuristic = async () => {
              try {
                const commit = await github.rest.repos.getCommit({
                  owner: context.repo.owner, repo: context.repo.repo, ref: headSha
                });
                const commitTime = new Date(commit.data.commit.committer.date).getTime();
                const runs = await github.rest.actions.listWorkflowRunsForRepo({
                  owner: 'AMD-Zenai', repo: 'ZenDNN_PyTorch_Plugin',
                  event: 'repository_dispatch', per_page: 30
                });
                const candidates = runs.data.workflow_runs
                  .filter(r => (r.display_title || r.name || '') === 'zendnnl-pr')
                  .filter(r => new Date(r.created_at).getTime() >= commitTime - 60000)
                  .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                if (candidates.length > 0) {
                  const run = candidates[0];
                  console.log(`↪️ Heuristic ZenTorch run: ${run.id} (${run.conclusion || run.status})`);
                  return {
                    found: true,
                    external_run_id: run.id,
                    external_run_url: run.html_url,
                    external_repo: 'AMD-Zenai/ZenDNN_PyTorch_Plugin',
                    external_status: run.conclusion || run.status,
                    match: 'dispatch_heuristic',
                    token_used: 'ZIAIE_PAT'
                  };
                }
              } catch (e) {
                console.log(`⚠️ dispatch heuristic failed: ${e.message}`);
              }
              return null;
            };

            // Poll for a few minutes to let the ZenTorch run start and post its status.
            let heuristic = null;
            const maxTries = 6;   // ~6 x 45s = 4.5 min
            for (let i = 1; i <= maxTries; i++) {
              const byStatus = await findByCommitStatus();
              // A status with a URL is the reliable answer.
              if (byStatus && byStatus.external_run_url) return byStatus;
              if (!heuristic) heuristic = await findByDispatchHeuristic();
              console.log(`⏳ Attempt ${i}/${maxTries}: ZenTorch link not ready yet, waiting 45s...`);
              await new Promise(r => setTimeout(r, 45000));
            }

            if (heuristic) return heuristic;
            console.log('⚠️ Could not resolve a ZenTorch build for this PR head SHA.');
            return { found: false, external_run_url: '', reason: 'not_found', token_used: 'ZIAIE_PAT' };

      - name: Wait for ALL workflows to complete
        id: wait_for_completion
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.ZIAIE_PAT }}
          script: |
            const pr = JSON.parse(`${{ steps.pr_info.outputs.result }}`);
            
            // Safe parsing of ZenTorch result
            let zentorchResult = { found: false };
            try {
              const zentorchOutput = `${{ steps.find_zentorch.outputs.result || '{}' }}`;
              zentorchResult = zentorchOutput ? JSON.parse(zentorchOutput) : { found: false };
            } catch (error) {
              console.log(`Could not parse zentorch result: ${error.message}`);
              zentorchResult = { found: false };
            }
            
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = pr.head_sha;

            console.log(`🔍 Monitoring workflows for PR #${pr.number}, commit: ${ref}`);
            console.log(`ZenTorch external workflow found: ${zentorchResult.found}`);
            if (zentorchResult.found) {
              console.log(`ZenTorch URL: ${zentorchResult.external_run_url}`);
            }
            
            const checkAllWorkflows = async () => {
              try {
                // Define ALL important workflows including ZenTorch status check
                const importantWorkflows = [
                  'commit message enforcement',
                  'zendnnl_build_pr', 
                  'check-zentorch-status',    // ✅ CRITICAL - This must complete!
                  'asan-build',
                  'zendnnl_build_push',
                  'check jira id',
                  'verify jira id',
                  'check license headers',
                  'verify license headers', 
                  'trigger-zentorch-zendnnl'
                ];

                console.log(`📊 Checking workflows for commit: ${ref.substring(0, 7)}`);

                // Get workflow runs
                const workflowResp = await github.rest.actions.listWorkflowRunsForRepo({
                  owner,
                  repo,
                  head_sha: ref,
                  per_page: 100
                });
                
                const workflows = (workflowResp.data.workflow_runs || [])
                  .filter(run => {
                    const name = run.name.toLowerCase();
                    const isImportant = importantWorkflows.some(important => 
                      name.includes(important.toLowerCase())
                    );
                    const isSelf = run.id === context.runId;
                    
                    return !isSelf && isImportant;
                  });

                // Get check runs
                const checkResp = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref,
                  per_page: 100
                });
                
                const checks = (checkResp.data.check_runs || [])
                  .filter(check => {
                    const name = check.name.toLowerCase();
                    const isImportant = importantWorkflows.some(important => 
                      name.includes(important.toLowerCase())
                    );
                    const isNotification = name.includes('notify') || 
                                         name.includes('notification') ||
                                         name.includes('pr status');  // Exclude this notification workflow
                    
                    return !isNotification && isImportant;
                  });

                // Combine all workflow information
                const allRuns = [];
                
                // Add local workflows
                workflows.forEach(run => {
                  allRuns.push({
                    id: run.id,
                    name: run.name,
                    status: run.conclusion || run.status,
                    url: run.html_url,
                    type: 'workflow_run',
                    repository: `${owner}/${repo}`
                  });
                });

                // Add local checks (avoid duplicates)
                checks.forEach(check => {
                  if (!allRuns.find(run => run.name === check.name)) {
                    allRuns.push({
                      id: check.id,
                      name: check.name,
                      status: check.conclusion || check.status,
                      url: check.html_url,
                      type: 'check_run',
                      repository: `${owner}/${repo}`
                    });
                  }
                });

                // ✅ CRITICAL: Check if ZenTorch status check exists and is monitored
                const zentorchStatusCheck = allRuns.find(run => 
                  run.name.toLowerCase().includes('zentorch') && 
                  run.name.toLowerCase().includes('status')
                );
                
                if (!zentorchStatusCheck) {
                  console.log(`⚠️  WARNING: ZenTorch status check not found in workflow list!`);
                  console.log(`Looking for any ZenTorch-related checks...`);
                  
                  // Search more broadly for ZenTorch checks
                  const allZentorchChecks = checks.filter(check => 
                    check.name.toLowerCase().includes('zentorch')
                  );
                  
                  if (allZentorchChecks.length > 0) {
                    console.log(`Found ${allZentorchChecks.length} ZenTorch-related checks:`);
                    allZentorchChecks.forEach(check => {
                      console.log(`  - ${check.name}: ${check.conclusion || check.status}`);
                      
                      // Add missing ZenTorch checks
                      if (!allRuns.find(run => run.id === check.id)) {
                        allRuns.push({
                          id: check.id,
                          name: check.name,
                          status: check.conclusion || check.status,
                          url: check.html_url,
                          type: 'check_run',
                          repository: `${owner}/${repo}`
                        });
                      }
                    });
                  }
                }

                // Add external ZenTorch workflow if found
                if (zentorchResult.found && zentorchResult.external_run_id) {
                  console.log(`📡 Adding external ZenTorch workflow to monitoring...`);
                  try {
                    const externalResp = await github.rest.actions.getWorkflowRun({
                      owner: 'AMD-Zenai',
                      repo: 'ZenDNN_PyTorch_Plugin',
                      run_id: zentorchResult.external_run_id
                    });
                    
                    allRuns.push({
                      id: externalResp.data.id,
                      name: `ZenDNN_PyTorch_Plugin: ${externalResp.data.display_title || externalResp.data.name}`,
                      status: externalResp.data.conclusion || externalResp.data.status,
                      url: externalResp.data.html_url,
                      type: 'triggered_workflow_run',
                      repository: 'AMD-Zenai/ZenDNN_PyTorch_Plugin'
                    });
                    
                    console.log(`External ZenTorch status: ${externalResp.data.conclusion || externalResp.data.status}`);
                  } catch (zentorchError) {
                    console.log(`❌ Could not get external ZenTorch status: ${zentorchError.message}`);
                  }
                }

                // ✅ SEPARATE RUNNING vs COMPLETED CHECKS
                const running = allRuns.filter(r => 
                  ['in_progress', 'queued', 'pending', 'waiting', 'requested'].includes(r.status)
                );
                
                const completed = allRuns.filter(r => 
                  ['success', 'failure', 'cancelled', 'skipped'].includes(r.status)
                );

                // ✅ DETAILED STATUS LOGGING
                console.log(`\n📋 WORKFLOW STATUS SUMMARY:`);
                console.log(`Total workflows found: ${allRuns.length}`);
                console.log(`Completed: ${completed.length}`);
                console.log(`Still running: ${running.length}`);

                console.log(`\n📊 ALL WORKFLOWS:`);
                allRuns.forEach(run => {
                  const statusIcon = run.status === 'success' ? '✅' : 
                                    run.status === 'failure' ? '❌' : 
                                    ['in_progress', 'pending', 'queued'].includes(run.status) ? '⏳' : 
                                    run.status === 'cancelled' ? '🟠' :
                                    run.status === 'skipped' ? '⏭️' : '🔄';
                  
                  console.log(`  ${statusIcon} ${run.name}: ${run.status.toUpperCase()}`);
                });
                
                if (running.length > 0) {
                  console.log(`\n⏳ STILL WAITING FOR:`);
                  running.forEach(r => {
                    console.log(`   🔄 ${r.name}: ${r.status}`);
                  });
                }

                // ✅ CRITICAL: Only complete when NO workflows are running
                const allComplete = running.length === 0 && allRuns.length > 0;
                
                if (allComplete) {
                  console.log(`\n🎉 ALL ${allRuns.length} WORKFLOWS COMPLETED!`);
                } else {
                  console.log(`\n⏳ Waiting for ${running.length} workflow(s) to complete...`);
                }

                return {
                  all_complete: allComplete,
                  workflows: allRuns,
                  running_count: running.length,
                  completed_count: completed.length,
                  total_count: allRuns.length,
                  zentorch_included: zentorchResult.found,
                  currently_running: running.map(r => r.name)
                };
                
              } catch (error) {
                console.log(`❌ Error checking workflows: ${error.message}`);
                return { 
                  all_complete: false,  // ✅ Don't force complete on error
                  workflows: [], 
                  error: error.message,
                  zentorch_included: false
                };
              }
            };

            // ✅ LONGER INITIAL WAIT for workflows to register
            console.log('⏳ Waiting 3 minutes for all workflows to initialize...');
            await new Promise(resolve => setTimeout(resolve, 180000));  // 3 minutes

            let result = await checkAllWorkflows();
            let attempts = 0;
            const maxAttempts = 90;  // 90 minutes max wait for cross-repo builds
            
            console.log(`\n🔍 INITIAL CHECK RESULTS:`);
            console.log(`Found ${result.total_count} workflows, ${result.running_count} still running`);

            // ✅ MONITOR UNTIL ALL COMPLETE (no forcing)
            while (!result.all_complete && attempts < maxAttempts) {
              attempts++;
              console.log(`\n⏳ ATTEMPT ${attempts}/${maxAttempts}:`);
              console.log(`   Still waiting for: ${result.currently_running?.join(', ') || 'unknown'}`);
              
              await new Promise(resolve => setTimeout(resolve, 60000));  // Wait 1 minute
              result = await checkAllWorkflows();
              
              // ✅ Special check for ZenTorch status
              const zentorchStillRunning = result.currently_running?.find(name => 
                name.toLowerCase().includes('zentorch')
              );
              if (zentorchStillRunning) {
                console.log(`🎯 ZenTorch check still running: ${zentorchStillRunning}`);
              }
            }

            // ✅ FINAL COMPLETION CHECK
            if (!result.all_complete) {
              console.log(`\n⏰ TIMEOUT after ${attempts} attempts (${maxAttempts} minutes).`);
              console.log(`⚠️  Still running: ${result.currently_running?.join(', ') || 'none'}`);
              console.log(`❌ FORCED COMPLETION - Some workflows may still be running!`);
              
              result.all_complete = true;
              result.timeout_reason = `Timeout after ${maxAttempts} minutes`;
              result.forced_completion = true;
            } else {
              console.log(`\n🎉 SUCCESS: All workflows completed after ${attempts} attempts! (${attempts} minutes)`);
            }

            return result;

      - name: Send Final Status Notification
        env:
          ZENDNNL_WEBHOOK_URL: ${{ secrets.ZENDNNL_WEBHOOK_URL }}
        run: |
          pr_json='${{ steps.pr_info.outputs.result }}'
          completion_json='${{ steps.wait_for_completion.outputs.result }}'
          REPO="${{ github.repository }}"

          echo "📤 Building Teams notification..."

          PR_NUMBER=$(echo "$pr_json" | jq -r '.number // "N/A"')
          PR_TITLE=$(echo "$pr_json" | jq -r '.title // "N/A"')
          PR_URL=$(echo "$pr_json" | jq -r '.url // "N/A"')
          PR_AUTHOR=$(echo "$pr_json" | jq -r '.author // "N/A"')
          HEAD_SHA=$(echo "$pr_json" | jq -r '.head_sha // "N/A"')
          SHORT_SHA=$(echo "$HEAD_SHA" | cut -c1-7)

          ALL_COMPLETE=$(echo "$completion_json" | jq -r '.all_complete // false')
          TOTAL_COUNT=$(echo "$completion_json" | jq -r '.total_count // 0')
          RUNNING_COUNT=$(echo "$completion_json" | jq -r '.running_count // 0')
          FORCED_COMPLETION=$(echo "$completion_json" | jq -r '.forced_completion // false')

          WORKFLOWS=$(echo "$completion_json" | jq -c '.workflows // []')

          SUCCESS_COUNT=$(echo "$WORKFLOWS" | jq '[.[]|select(.status=="success")]|length')
          FAILED_COUNT=$(echo "$WORKFLOWS" | jq '[.[]|select(.status=="failure")]|length')
          CANCELLED_COUNT=$(echo "$WORKFLOWS" | jq '[.[]|select(.status=="cancelled")]|length')
          SKIPPED_COUNT=$(echo "$WORKFLOWS" | jq '[.[]|select(.status=="skipped")]|length')

          FALLBACK_URL="https://github.com/${REPO}/pull/${PR_NUMBER}/checks"

          # Determine overall status + MessageCard theme color (this webhook renders the
          # legacy Office 365 "MessageCard" format, NOT Adaptive Cards).
          if [ "$FAILED_COUNT" -gt 0 ]; then
            ICON="🔴"; STATUS_TEXT="❌ SOME CHECKS FAILED"; THEME="D93F0B"
          elif [ "$CANCELLED_COUNT" -gt 0 ]; then
            ICON="🟠"; STATUS_TEXT="🟠 SOME CHECKS CANCELLED"; THEME="F2A100"
          elif [ "$FORCED_COMPLETION" = "true" ]; then
            ICON="🟡"; STATUS_TEXT="⏰ TIMEOUT - SOME CHECKS MAY STILL BE RUNNING"; THEME="F2C744"
          elif [ "$ALL_COMPLETE" = "true" ] && [ "$SUCCESS_COUNT" -gt 0 ]; then
            ICON="🟢"; STATUS_TEXT="✅ ALL CHECKS PASSED"; THEME="2EB67D"
          elif [ "$ALL_COMPLETE" = "true" ] && [ "$TOTAL_COUNT" -eq 0 ]; then
            ICON="⚪"; STATUS_TEXT="⚪ NO WORKFLOWS FOUND"; THEME="808080"
          else
            ICON="🟡"; STATUS_TEXT="⏳ CHECKS IN PROGRESS"; THEME="F2C744"
          fi

          # Completion status line
          if [ "$FORCED_COMPLETION" = "true" ]; then
            COMPLETION_TEXT="⏰ Timeout reached - $RUNNING_COUNT workflows may still be running"
          elif [ "$ALL_COMPLETE" = "true" ]; then
            COMPLETION_TEXT="All $TOTAL_COUNT workflows completed"
          else
            COMPLETION_TEXT="⏰ $RUNNING_COUNT of $TOTAL_COUNT workflows still running"
          fi

          # Build workflow results list as markdown (safe escaping via jq).
          # Each row: emoji [name](url) — STATUS (repo, if from a different repository)
          echo "🔨 Building workflow results list..."
          WORKFLOWS_MD=$(echo "$WORKFLOWS" | jq -r --arg fallback "$FALLBACK_URL" --arg selfrepo "$REPO" '
            [ .[] as $w
              | ($w.status | ascii_upcase) as $s
              | (if   $s=="SUCCESS"   then "✅"
                 elif $s=="FAILURE"   then "❌"
                 elif $s=="CANCELLED" then "🟠"
                 elif $s=="SKIPPED"   then "⏭️"
                 elif ($s=="IN_PROGRESS" or $s=="QUEUED" or $s=="PENDING") then "🔄"
                 else "⚪" end) as $emoji
              | (if ($w.url==null or $w.url=="") then $fallback else $w.url end) as $url
              | (($w.repository // "")) as $repo
              | (if ($repo != "" and $repo != $selfrepo) then " (" + $repo + ")" else "" end) as $repotext
              | $emoji + " [" + $w.name + "](" + $url + ") — **" + $s + "**" + $repotext
            ] | join("\n\n")')
          [ -z "$WORKFLOWS_MD" ] && WORKFLOWS_MD="_No workflows found._"

          # Assemble a legacy MessageCard with jq so it is ALWAYS valid JSON
          echo "🔨 Creating Teams MessageCard..."
          jq -n \
            --arg summary "PR #$PR_NUMBER status" \
            --arg theme "$THEME" \
            --arg title "$ICON PR #$PR_NUMBER — $PR_TITLE" \
            --arg status "$STATUS_TEXT" \
            --arg author "$PR_AUTHOR" --arg sha "$SHORT_SHA" --arg msg "$COMPLETION_TEXT" \
            --arg total "$TOTAL_COUNT" --arg passed "$SUCCESS_COUNT" --arg failed "$FAILED_COUNT" \
            --arg cancelled "$CANCELLED_COUNT" --arg skipped "$SKIPPED_COUNT" \
            --arg wfmd "$WORKFLOWS_MD" \
            --arg prurl "$PR_URL" --arg checksurl "$FALLBACK_URL" \
            --arg commiturl "https://github.com/${REPO}/commit/${HEAD_SHA}" '
            {
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              summary: $summary,
              themeColor: $theme,
              title: $title,
              sections: [
                {
                  activityTitle: $status,
                  facts: [
                    {name:"Author:",          value:$author},
                    {name:"Commit:",          value:$sha},
                    {name:"Status:",          value:$msg},
                    {name:"Total Workflows:", value:$total},
                    {name:"✅ Passed:",        value:$passed},
                    {name:"❌ Failed:",        value:$failed},
                    {name:"🟠 Cancelled:",     value:$cancelled},
                    {name:"⏭️ Skipped:",       value:$skipped}
                  ],
                  markdown: true
                },
                {
                  title: "All Workflow Results:",
                  text: $wfmd,
                  markdown: true
                }
              ],
              potentialAction: [
                {"@type":"OpenUri", name:"View PR",         targets:[{os:"default", uri:$prurl}]},
                {"@type":"OpenUri", name:"View All Checks", targets:[{os:"default", uri:$checksurl}]},
                {"@type":"OpenUri", name:"View Commit",     targets:[{os:"default", uri:$commiturl}]}
              ]
            }' > card.json

          echo "🔎 Validating card JSON..."
          jq empty card.json || { echo "❌ Invalid card JSON"; cat card.json; exit 1; }

          echo "📤 Sending Teams notification..."
          HTTP_CODE=$(curl -s -o resp.txt -w "%{http_code}" -H "Content-Type: application/json" -d @card.json "$ZENDNNL_WEBHOOK_URL")
          echo "HTTP $HTTP_CODE"
          cat resp.txt || true
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Teams notification sent successfully!"
          else
            echo "❌ Failed to send Teams notification"
            exit 1
          fi
